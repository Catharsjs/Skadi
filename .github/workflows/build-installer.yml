name: Build Skadi Installer

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-2025-vs2026

    env:
      CONFIGURATION: Release
      PLATFORM: x64
      RUNTIME_ID: win-x64
      APP_PROJECT: EventCapture.App\EventCapture.App.csproj
      NATIVE_PROJECT: EventCapture.Native\EventCapture.Native.vcxproj
      ISS_SCRIPT: Installer\Skadi.iss
      PUBLISH_DIR: EventCapture.App\bin\x64\Release\net10.0-windows10.0.19041.0\win-x64\publish
      INSTALLER_OUTPUT_DIR: Installer\Output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build native project
        shell: pwsh
        run: |
          msbuild $env:NATIVE_PROJECT `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /m `
            /restore

      - name: Publish WPF app
        shell: pwsh
        run: |
          msbuild $env:APP_PROJECT `
            /t:Restore,Publish `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:RuntimeIdentifier=$env:RUNTIME_ID `
            /p:SelfContained=false `
            /m

      - name: Validate publish output
        shell: pwsh
        run: |
          if (!(Test-Path "$env:PUBLISH_DIR\Skadi.exe")) {
            Write-Error "Skadi.exe was not found in publish directory: $env:PUBLISH_DIR"
          }

          Get-ChildItem $env:PUBLISH_DIR

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:INSTALLER_OUTPUT_DIR | Out-Null

          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            $env:ISS_SCRIPT `
            "/DSourceDir=$env:GITHUB_WORKSPACE\$env:PUBLISH_DIR" `
            "/DInstallerOutputDir=$env:GITHUB_WORKSPACE\$env:INSTALLER_OUTPUT_DIR"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skadi-Installer
          path: Installer/Output/*.exe

      - name: Update dev-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Skadi dev latest
          prerelease: true
          make_latest: false
          files: Installer/Output/*.exe
name: Build Skadi Installer

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-2025-vs2026

    env:
      CONFIGURATION: Release
      PLATFORM: x64
      RUNTIME_ID: win-x64
      APP_PROJECT: EventCapture.App\EventCapture.App.csproj
      NATIVE_PROJECT: EventCapture.Native\EventCapture.Native.vcxproj
      ISS_SCRIPT: Installer\Skadi.iss
      INSTALLER_OUTPUT_DIR: Installer\Output
      DIST_DIR: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build native DLL
        shell: pwsh
        run: |
          msbuild $env:NATIVE_PROJECT `
            /restore `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /m

      - name: Publish WPF app
        shell: pwsh
        run: |
          msbuild $env:APP_PROJECT `
            /t:Restore,Publish `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:RuntimeIdentifier=$env:RUNTIME_ID `
            /p:SelfContained=false `
            /p:PublishSingleFile=false `
            /m

      - name: Locate publish output
        id: publish
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "EventCapture.App\bin" -Recurse -Filter "Skadi.exe" |
            Where-Object { $_.FullName -like "*\publish\*" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $exe) {
            Write-Error "Skadi.exe was not found in any publish directory."
          }

          $publishDir = $exe.Directory.FullName
          "publish_dir=$publishDir" >> $env:GITHUB_OUTPUT

      - name: Validate native DLL
        shell: pwsh
        run: |
          $nativeDll = Join-Path "${{ steps.publish.outputs.publish_dir }}" "EventCapture.Native.dll"
          $vplDll = Join-Path "${{ steps.publish.outputs.publish_dir }}" "libvpl.dll"

          if (!(Test-Path $nativeDll)) {
            Write-Error "EventCapture.Native.dll was not copied to publish directory."
          }

          if (!(Test-Path $vplDll)) {
            Write-Error "libvpl.dll was not copied to publish directory."
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:INSTALLER_OUTPUT_DIR | Out-Null

          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            $env:ISS_SCRIPT `
            "/DSourceDir=${{ steps.publish.outputs.publish_dir }}" `
            "/DInstallerOutputDir=$env:GITHUB_WORKSPACE\$env:INSTALLER_OUTPUT_DIR"

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:DIST_DIR | Out-Null

          $source = Get-ChildItem $env:INSTALLER_OUTPUT_DIR -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $source) {
            Write-Error "Installer .exe was not found."
          }

          $target = Join-Path $env:DIST_DIR "SkadiSetup.exe"
          Copy-Item $source.FullName $target -Force

          "asset_path=$target" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skadi-Installer
          path: dist/*.exe

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Skadi
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: dist/*.exe
          body: |
            Skadi 2.0.2

            Commit: ${{ github.sha }}
            Tag: ${{ github.ref_name }}

      - name: Remove legacy rolling release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repository = $env:GITHUB_REPOSITORY
          $releaseJson = gh api "repos/$repository/releases/tags/dev-latest" 2>$null

          if ($LASTEXITCODE -eq 0 -and $releaseJson) {
            $release = $releaseJson | ConvertFrom-Json
            gh api --method DELETE "repos/$repository/releases/$($release.id)"
          }

          $tagJson = gh api "repos/$repository/git/ref/tags/dev-latest" 2>$null
          if ($LASTEXITCODE -eq 0 -and $tagJson) {
            gh api --method DELETE "repos/$repository/git/refs/tags/dev-latest"
          }

          exit 0
